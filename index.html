<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>親子活動搜尋器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a18;
    --paper: #f5f2eb;
    --paper2: #ede9df;
    --accent: #b85c2a;
    --accent2: #4a7c6f;
    --muted: #7a7670;
    --border: #d6d0c4;
    --tag-bg: #e8e2d6;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* Header */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 28px 24px 24px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.15;
  }
  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 600;
    letter-spacing: 0.02em;
    position: relative;
  }
  header p {
    font-size: 13px;
    color: #aaa9a3;
    margin-top: 6px;
    position: relative;
  }

  /* Main layout */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* Card */
  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }

  /* API key input */
  .key-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .key-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', monospace;
    font-size: 13px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border 0.2s;
  }
  .key-input:focus { border-color: var(--accent2); }
  .toggle-vis {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--paper);
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }
  .toggle-vis:hover { background: var(--paper2); }

  /* Region toggles */
  .region-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .region-btn {
    padding: 7px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--paper);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
  }
  .region-btn.on {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* Age / month controls */
  .control-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 140px;
  }
  .control-label {
    font-size: 12px;
    color: var(--muted);
  }
  .control-input {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
  }
  .control-input:focus { border-color: var(--accent2); }

  /* Interest tags */
  .interest-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .interest-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--tag-bg);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
  }
  .interest-btn.on {
    background: var(--accent2);
    color: white;
    border-color: var(--accent2);
  }

  /* Search button */
  .search-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
  }
  .search-btn:hover { background: #9e4d22; transform: translateY(-1px); }
  .search-btn:active { transform: translateY(0); }
  .search-btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .loading.show { display: block; }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box {
    display: none;
    background: #fef2f0;
    border: 1px solid #f5c6bc;
    border-radius: var(--radius);
    padding: 16px 20px;
    color: #a33;
    font-size: 14px;
    margin-bottom: 16px;
  }
  .error-box.show { display: block; }

  /* Results */
  #results { display: none; }
  #results.show { display: block; }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .results-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 600;
  }
  .results-meta {
    font-size: 12px;
    color: var(--muted);
  }

  .action-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .action-btn {
    padding: 9px 18px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
  }
  .action-btn:hover { background: var(--paper2); }
  .action-btn.notion { background: var(--ink); color: white; border-color: var(--ink); }
  .action-btn.notion:hover { background: #333; }
  .action-btn.notion:disabled { background: var(--muted); cursor: not-allowed; }

  /* Activity cards */
  .activity-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .activity-card:nth-child(2) { animation-delay: 0.05s; }
  .activity-card:nth-child(3) { animation-delay: 0.1s; }
  .activity-card:nth-child(4) { animation-delay: 0.15s; }
  .activity-card:nth-child(5) { animation-delay: 0.2s; }

  .activity-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }
  .activity-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 600;
    flex: 1;
    line-height: 1.4;
  }
  .region-tag {
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    background: var(--tag-bg);
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .activity-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .activity-meta span {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .activity-reason {
    font-size: 14px;
    color: #4a4845;
    line-height: 1.65;
    border-left: 2px solid var(--accent2);
    padding-left: 12px;
    margin-bottom: 10px;
  }
  .activity-link {
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border 0.15s;
  }
  .activity-link:hover { border-bottom-color: var(--accent); }

  /* Notion config */
  .notion-config {
    display: none;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .notion-config.show { display: block; }
  .notion-config .card-title { margin-bottom: 12px; }
  .notion-fields { display: flex; flex-direction: column; gap: 10px; }
  .notion-field label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
  .notion-field input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: white;
    color: var(--ink);
    font-family: monospace;
    outline: none;
  }
  .notion-field input:focus { border-color: var(--accent2); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    header { padding: 20px 16px; }
    .card { padding: 16px; }
    .activity-top { flex-direction: column; }
    .region-tag { align-self: flex-start; }
  }
</style>
</head>
<body>

<header>
  <h1>親子活動搜尋器</h1>
  <p>以 AI 篩選台北及近郊適合孩子的體驗活動</p>
</header>

<main>

  <!-- API Keys -->
  <div class="card">
    <div class="card-title">API 金鑰設定</div>
    <div style="margin-bottom:12px">
      <div class="control-label" style="margin-bottom:6px">Gemini API Key（必填）</div>
      <div class="key-row">
        <input class="key-input" id="geminiKey" type="password" placeholder="AIza..." autocomplete="off">
        <button class="toggle-vis" onclick="toggleVis('geminiKey')">顯示</button>
      </div>
    </div>
    <div style="font-size:12px;color:var(--muted)">
      Key 只存在瀏覽器，不會傳送到任何伺服器。
      <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent2)">免費申請 Gemini Key →</a>
    </div>
  </div>

  <!-- Search settings -->
  <div class="card">
    <div class="card-title">搜尋設定</div>

    <div class="control-row" style="margin-bottom:16px">
      <div class="control-group">
        <div class="control-label">孩子年齡</div>
        <input class="control-input" id="childAge" type="number" value="12" min="1" max="18">
      </div>
      <div class="control-group">
        <div class="control-label">搜尋未來幾週</div>
        <input class="control-input" id="weeksAhead" type="number" value="4" min="1" max="12">
      </div>
    </div>

    <div style="margin-bottom:16px">
      <div class="control-label" style="margin-bottom:8px">活動地區</div>
      <div class="region-grid" id="regionGroup">
        <button class="region-btn on" data-val="台北市區">台北市區</button>
        <button class="region-btn on" data-val="新北／基隆">新北／基隆</button>
        <button class="region-btn on" data-val="宜蘭／桃園">宜蘭／桃園</button>
        <button class="region-btn" data-val="外縣市旅行">外縣市旅行</button>
      </div>
    </div>

    <div>
      <div class="control-label" style="margin-bottom:8px">興趣方向（可複選，不選則全搜）</div>
      <div class="interest-grid" id="interestGroup">
        <button class="interest-btn" data-val="藝術與設計">藝術與設計</button>
        <button class="interest-btn" data-val="科學與科技">科學與科技</button>
        <button class="interest-btn" data-val="自然與戶外">自然與戶外</button>
        <button class="interest-btn" data-val="歷史與文化">歷史與文化</button>
        <button class="interest-btn" data-val="音樂與表演">音樂與表演</button>
        <button class="interest-btn" data-val="手作與工藝">手作與工藝</button>
        <button class="interest-btn" data-val="運動與體能">運動與體能</button>
        <button class="interest-btn" data-val="美食與生活">美食與生活</button>
      </div>
    </div>
  </div>

  <button class="search-btn" id="searchBtn" onclick="doSearch()">搜尋並篩選活動</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="loadingText">AI 正在搜尋並篩選活動中⋯</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div id="results">
    <div class="results-header">
      <div class="results-title">本週推薦活動</div>
      <div class="results-meta" id="resultsMeta"></div>
    </div>

    <div class="action-row">
      <button class="action-btn" onclick="copyList()">複製清單</button>
      <button class="action-btn notion" id="notionBtn" onclick="toggleNotionConfig()">存入 Notion</button>
    </div>

    <!-- Notion config (hidden by default) -->
    <div class="notion-config" id="notionConfig">
      <div class="card-title">Notion 設定</div>
      <div class="notion-fields">
        <div class="notion-field">
          <label>Notion Integration Token</label>
          <input type="password" id="notionToken" placeholder="secret_...">
        </div>
        <div class="notion-field">
          <label>Database ID（從 Notion 頁面 URL 取得）</label>
          <input type="text" id="notionDbId" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
        </div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <button class="action-btn notion" onclick="saveToNotion()" id="notionSaveBtn">確認存入</button>
          <button class="action-btn" onclick="toggleNotionConfig()">取消</button>
        </div>
        <div style="font-size:12px;color:var(--muted)">
          需先在 Notion 建立包含以下欄位的資料庫：名稱(title)、日期(date)、地點(rich_text)、連結(url)、推薦理由(rich_text)、地區(select)。
          <a href="https://www.notion.so/my-integrations" target="_blank" style="color:var(--accent2)">建立 Integration →</a>
        </div>
      </div>
    </div>

    <div id="activityList"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
let lastActivities = [];

// Toggle buttons
document.querySelectorAll('.region-btn').forEach(btn => {
  btn.addEventListener('click', () => btn.classList.toggle('on'));
});
document.querySelectorAll('.interest-btn').forEach(btn => {
  btn.addEventListener('click', () => btn.classList.toggle('on'));
});

function toggleVis(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

function getRegions() {
  return [...document.querySelectorAll('.region-btn.on')].map(b => b.dataset.val);
}
function getInterests() {
  return [...document.querySelectorAll('.interest-btn.on')].map(b => b.dataset.val);
}

async function doSearch() {
  const apiKey = document.getElementById('geminiKey').value.trim();
  if (!apiKey) { showError('請先填入 Gemini API Key'); return; }

  const regions = getRegions();
  if (!regions.length) { showError('請至少選擇一個地區'); return; }

  const age = document.getElementById('childAge').value || '12';
  const weeks = document.getElementById('weeksAhead').value || '4';
  const interests = getInterests();

  const interestText = interests.length
    ? `興趣方向偏好：${interests.join('、')}`
    : '不限興趣，廣泛搜尋各類體驗活動';

  const today = new Date();
  const dateStr = today.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric' });

  const prompt = `今天是 ${dateStr}。

請幫我搜尋並整理台灣以下地區，未來 ${weeks} 週內，適合 ${age} 歲男孩參與的親子體驗活動：
地區範圍：${regions.join('、')}
${interestText}

搜尋方向包括但不限於：
- Accupass、KKtix 等活動平台上的體驗課程或工作坊
- 北美館、富邦美術館、當代藝術館等美術館的特展或親子活動
- 國立科學工藝博物館、海科館等科學場館的活動
- 各縣市文化局舉辦的親子活動
- 自然、農場、戶外體驗類活動

請提供 5–7 個推薦活動，以 JSON 格式回覆，不要有其他說明文字，也不要用 markdown 的 \`\`\`json 包住，直接輸出純 JSON 陣列，格式如下：
[
  {
    "name": "活動名稱",
    "date": "日期或期間（例如：2024/05/18 或 5/18–5/26）",
    "location": "地點（場館名稱＋區域）",
    "region": "地區分類（台北市區／新北・基隆／宜蘭・桃園／外縣市）",
    "link": "報名或詳情連結（如不確定請填 https://www.accupass.com）",
    "reason": "推薦理由（2–3 句，從培養孩子品味與視野的角度說明為何這個活動值得參與）"
  }
]`;

  setLoading(true);
  clearError();
  document.getElementById('results').classList.remove('show');

  try {
    const model = 'gemini-2.5-flash';
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ role: 'user', parts: [{ text: prompt }] }],
        tools: [{ google_search: {} }],
        generationConfig: {
          temperature: 0.5,
          maxOutputTokens: 3000
        }
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API 錯誤 ${res.status}`);
    }

    const data = await res.json();

    // Extract all text parts from Gemini response (may include search results + answer)
    const candidate = data.candidates?.[0];
    if (!candidate) throw new Error('Gemini 沒有回傳結果，請再試一次');

    const parts = candidate.content?.parts || [];
    let text = parts
      .filter(p => p.text && p.text.trim().length > 0)
      .map(p => p.text)
      .join('\n');

    if (!text) throw new Error('Gemini 沒有回傳文字內容，請再試一次');

    // Strip markdown code fences
    text = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();

    // Try to find JSON array in response
    const jsonMatch = text.match(/\[[\s\S]*?\](?=\s*$)/) || text.match(/\[[\s\S]*\]/);
    if (!jsonMatch) {
      // Last resort: try to parse entire text as JSON
      try {
        const activities = JSON.parse(text);
        if (Array.isArray(activities)) {
          lastActivities = activities;
          renderResults(activities, regions, age, weeks);
          return;
        }
      } catch {}
      throw new Error('AI 回覆格式異常，請再試一次（若持續發生請重新整理頁面）');
    }

    const activities = JSON.parse(jsonMatch[0]);
    if (!Array.isArray(activities) || activities.length === 0) {
      throw new Error('AI 未找到符合條件的活動，請調整搜尋條件後再試');
    }

    lastActivities = activities;
    renderResults(activities, regions, age, weeks);

  } catch (e) {
    showError(e.message || '搜尋失敗，請確認 Gemini API Key 是否正確');
  } finally {
    setLoading(false);
  }
}

function renderResults(activities, regions, age, weeks) {
  const list = document.getElementById('activityList');
  const meta = document.getElementById('resultsMeta');

  meta.textContent = `共 ${activities.length} 個活動 · ${regions.join('、')} · 未來 ${weeks} 週`;

  list.innerHTML = activities.map((a, i) => `
    <div class="activity-card" style="animation-delay:${i*0.06}s">
      <div class="activity-top">
        <div class="activity-name">${escHtml(a.name)}</div>
        <div class="region-tag">${escHtml(a.region || '')}</div>
      </div>
      <div class="activity-meta">
        <span>📅 ${escHtml(a.date || '日期待確認')}</span>
        <span>📍 ${escHtml(a.location || '')}</span>
      </div>
      <div class="activity-reason">${escHtml(a.reason || '')}</div>
      ${a.link && a.link !== '#' ? `<a class="activity-link" href="${escHtml(a.link)}" target="_blank">查看詳情與報名 →</a>` : ''}
    </div>
  `).join('');

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyList() {
  if (!lastActivities.length) return;
  const text = lastActivities.map((a, i) =>
    `${i+1}. ${a.name}\n   日期：${a.date}\n   地點：${a.location}（${a.region}）\n   推薦理由：${a.reason}\n   連結：${a.link}`
  ).join('\n\n');
  navigator.clipboard.writeText(text).then(() => showToast('清單已複製到剪貼簿'));
}

function toggleNotionConfig() {
  const el = document.getElementById('notionConfig');
  el.classList.toggle('show');
}

async function saveToNotion() {
  const token = document.getElementById('notionToken').value.trim();
  const dbId = document.getElementById('notionDbId').value.trim().replace(/-/g, '');
  if (!token || !dbId) { showToast('請填入 Notion Token 和 Database ID'); return; }
  if (!lastActivities.length) { showToast('沒有可存入的活動資料'); return; }

  const btn = document.getElementById('notionSaveBtn');
  btn.disabled = true;
  btn.textContent = '存入中...';

  let success = 0, fail = 0;

  for (const a of lastActivities) {
    try {
      const res = await fetch('https://api.notion.com/v1/pages', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json',
          'Notion-Version': '2022-06-28'
        },
        body: JSON.stringify({
          parent: { database_id: dbId },
          properties: {
            '名稱': { title: [{ text: { content: a.name || '' } }] },
            '日期': { rich_text: [{ text: { content: a.date || '' } }] },
            '地點': { rich_text: [{ text: { content: a.location || '' } }] },
            '連結': { url: a.link || null },
            '推薦理由': { rich_text: [{ text: { content: a.reason || '' } }] },
            '地區': { select: { name: a.region || '台北市區' } }
          }
        })
      });
      if (res.ok) success++; else fail++;
    } catch { fail++; }
  }

  btn.disabled = false;
  btn.textContent = '確認存入';
  toggleNotionConfig();
  showToast(fail === 0
    ? `已成功存入 ${success} 個活動到 Notion`
    : `存入完成：${success} 成功，${fail} 失敗`
  );
}

function setLoading(on) {
  document.getElementById('loading').classList.toggle('show', on);
  document.getElementById('searchBtn').disabled = on;
  document.getElementById('searchBtn').textContent = on ? '搜尋中...' : '搜尋並篩選活動';
}
function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('show');
}
function clearError() {
  document.getElementById('errorBox').classList.remove('show');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
